server {
    listen       8080 default_server;
    listen       [::]:8080 default_server;
    server_name  _;

    # 安全 HTTP 头
    add_header   X-Powered-By             "ipinfo.tw/github" always;
    add_header   Cache-Control            "no-store" always;
    add_header   X-Frame-Options          "SAMEORIGIN" always;
    add_header   X-XSS-Protection         "1; mode=block" always;
    add_header   X-Content-Type-Options   "nosniff" always;
    add_header   Referrer-Policy          "no-referrer-when-downgrade" always;
    add_header   Content-Security-Policy  "default-src 'none'; img-src 'self'" always;

    # 定义组合变量
    set $ip_country    "$ip_country_code / $ip_country_name";
    set $ip_as         "AS$ip_asn / $ip_aso";
    set $ip_org        "AS$ip_asn $ip_aso";
    set $ip_loc        "$ip_location_latitude,$ip_location_longitude";

    # 静态资源
    location = /favicon.ico {
        root /usr/share/nginx/html;
        access_log off;
        log_not_found off;
    }

    location = /robots.txt {
        access_log off;
        log_not_found off;
    }

    # 跳转链接
    location = /github {
        return 301 https://github.com/honeok/Tools/forge/ipinfo;
    }

    # 基本IP信息
    location = /ip {
        return 200 "$remote_addr\n";
    }

    location = /country {
        return 200 "$ip_country\n";
    }

    location = /country_code {
        return 200 "$ip_country_code\n";
    }

    location = /country_name {
        return 200 "$ip_country_name\n";
    }

    location = /city {
        return 200 "$ip_city_name\n";
    }

    location = /region {
        return 200 "$ip_subdivision_name\n";
    }

    location = /loc {
        return 200 "$ip_loc\n";
    }

    location = /timezone {
        return 200 "$ip_timezone\n";
    }

    location = /as {
        return 200 "$ip_as\n";
    }

    location = /asn {
        return 200 "$ip_asn\n";
    }

    location = /as_desc {
        return 200 "$ip_aso\n";
    }

    location = /org {
        return 200 "$ip_org\n";
    }

    location = /user_agent {
        return 200 "$http_user_agent\n";
    }

    location ~* ^/index.htm(l)?$ {
        rewrite ^(.*)$ /;
    }

    location = / {
        return 200 "$remote_addr\n$ip_country\n$ip_as\n\n$http_user_agent\n";
    }

    # JSON API返回
    location = /json {
        default_type application/json;
        return 200 "{
\"ip\": \"$remote_addr\",
\"city\": \"$ip_city_name\",
\"region\": \"$ip_subdivision_name\",
\"country\": \"$ip_country_code\",
\"loc\": \"$ip_loc\",
\"org\": \"$ip_org\",
\"timezone\": \"$ip_timezone\",
\"readme\": \"https://github.com/honeok/Tools/forge/ipinfo\"
}\n";
    }

    location = /build_epoch {
        default_type application/json;
        return 200 "{
\"GeoLite2-Country\": \"$ip_country_build_epoch\",
\"GeoLite2-ASN\": \"$ip_as_build_epoch\",
\"GeoLite2-City\": \"$ip_city_build_epoch\"
}\n";
    }

    location = /health {
        return 200 'OK';
        access_log off;
        log_not_found off;
        add_header Content-Type text/plain;
    }

    location @404 {
        return 404 "404 not found. See https://github.com/honeok/Tools/forge/ipinfo\n";
    }

    error_page 404 = @404;
}
name: Delete all workflow runs

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * 0' # 每周日 UTC 时间 2 点执行（可改）

permissions:
  actions: write
  contents: read

jobs:
  delete:
    runs-on: ubuntu-latest

    steps:
      - name: Set up GitHub CLI
        run: |
          sudo apt update
          sudo apt install -y gh jq

      - name: Authenticate with GITHUB_TOKEN
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | gh auth login --with-token

      - name: Delete all workflow runs
        run: |
          REPO="${{ github.repository }}"
          PER_PAGE=100

          workflow_ids=$(gh api -H "Accept: application/vnd.github+json" \
            /repos/$REPO/actions/workflows | jq '.workflows[].id')

          for wid in $workflow_ids; do
            echo "Checking workflow ID: $wid"
            page=1

            while :; do
              runs=$(gh api -H "Accept: application/vnd.github+json" \
                "/repos/$REPO/actions/workflows/$wid/runs?per_page=$PER_PAGE&page=$page" | jq '.workflow_runs[]?.id')

              if [ -z "$runs" ]; then
                break
              fi

              for run_id in $runs; do
                echo "Deleting run $run_id"
                gh api -X DELETE -H "Accept: application/vnd.github+json" \
                  "/repos/$REPO/actions/runs/$run_id"
              done

              ((page++))
            done
          done
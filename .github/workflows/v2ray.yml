---
name: 'Build and Publish v2ray'

on:
  schedule:
    - cron: '0 16 * * *'
  workflow_dispatch:

env:
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
  DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        platform:
          - linux/386
          - linux/amd64
          - linux/arm/v6
          - linux/arm/v7
          - linux/arm64/v8
          - linux/ppc64le
          - linux/riscv64
          - linux/s390x

    steps:
      - name: 'Check out repository'
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      - name: 'Fetch Versions and Determine Build'
        run: |
          if [[ -z "${{ github.event.inputs.tag }}" ]]; then
            V2RAY_LTAG="$(wget -qO- --tries 5 "https://api.github.com/repos/v2fly/v2ray-core/releases" | sed -n 's/.*"tag_name": *"\(v[^"]*\)".*/\1/p' | sort -Vr | head -n1)"
            V2RAY_LVER="${V2RAY_LTAG#v}"
          else
            V2RAY_LTAG="${{ github.event.inputs.tag }}"
            V2RAY_LVER="${V2RAY_LTAG#v}"
          fi
          if [[ -z "$V2RAY_LTAG" || -z "$V2RAY_LVER" ]]; then
            echo 'Error: Required parameters cannot be empty.'; exit 1
          fi
          V2RAY_CVER="$(wget -qO- --tries 5 "https://hub.docker.com/v2/repositories/honeok/v2ray/tags" 2>/dev/null | jq -r ".results // [] | .[].name" | grep -v '^latest$' | sort -Vr | head -n1 | cut -d'-' -f1 || echo "")"
          echo "V2RAY_LTAG=$V2RAY_LTAG" >> $GITHUB_ENV
          echo "V2RAY_LVER=$V2RAY_LVER" >> $GITHUB_ENV
          echo "V2RAY_CVER=$V2RAY_CVER" >> $GITHUB_ENV
          if [[ "$(echo -e "$V2RAY_LVER\n$V2RAY_CVER" | sort -V | head -n1)" != "$V2RAY_LVER" || -z "$V2RAY_CVER" ]]; then
            echo "IS_RENEW=1" >> $GITHUB_ENV
          fi

      - name: 'Pre-build preparation'
        run: |
          platform=${{ matrix.platform }}
          echo "PLATFORM_PAIR=${platform//\//-}" >> $GITHUB_ENV

      - name: 'Set up Docker QEMU'
        if: env.IS_RENEW == 1 || github.event_name == 'workflow_dispatch'
        uses: docker/setup-qemu-action@v3.6.0

      - name: 'Set up Docker Buildx'
        if: env.IS_RENEW == 1 || github.event_name == 'workflow_dispatch'
        uses: docker/setup-buildx-action@v3.10.0

      - name: 'Login to DockerHub'
        if: env.IS_RENEW == 1 || github.event_name == 'workflow_dispatch'
        uses: docker/login-action@v3.4.0
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ env.DOCKER_PASSWORD }}

      - name: 'Docker image metadata'
        id: meta
        uses: docker/metadata-action@v5.6.1
        with:
          images: ${{ env.DOCKER_USERNAME }}/v2ray

      - name: 'Build and Push by digest'
        id: build
        if: env.IS_RENEW == 1 || github.event_name == 'workflow_dispatch'
        uses: docker/build-push-action@v6.17.0
        with:
          context: "{{ defaultContext }}:core/v2ray"
          file: Dockerfile
          platforms: ${{ matrix.platform }}
          build-args: |
            BUILDKIT_CONTEXT_KEEP_GIT_DIR=1
            VERSION=${{ env.V2RAY_LTAG }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: |
            type=image,name=${{ env.DOCKER_USERNAME }}/v2ray
            push-by-digest=true
            name-canonical=true
            push=true

      - name: 'Export image digest'
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: 'Upload image digest'
        uses: actions/upload-artifact@v4.6.1
        with:
          name: digests-${{ env.PLATFORM_PAIR }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    runs-on: ubuntu-latest
    needs:
      - build
    steps:
      - name: 'Fetch Versions and Determine Build'
        run: |
          if [[ -z "${{ github.event.inputs.tag }}" ]]; then
            V2RAY_LTAG="$(wget -qO- --tries 5 "https://api.github.com/repos/v2fly/v2ray-core/releases" | sed -n 's/.*"tag_name": *"\(v[^"]*\)".*/\1/p' | sort -Vr | head -n1)"
            V2RAY_LVER="${V2RAY_LTAG#v}"
          else
            V2RAY_LTAG="${{ github.event.inputs.tag }}"
            V2RAY_LVER="${V2RAY_LTAG#v}"
          fi
          if [[ -z "$V2RAY_LTAG" || -z "$V2RAY_LVER" ]]; then
            echo 'Error: Required parameters cannot be empty.'; exit 1
          fi
          V2RAY_CVER="$(wget -qO- --tries 5 "https://hub.docker.com/v2/repositories/honeok/v2ray/tags" 2>/dev/null | jq -r ".results // [] | .[].name" | grep -v '^latest$' | sort -Vr | head -n1 | cut -d'-' -f1 || echo "")"
          echo "V2RAY_LTAG=$V2RAY_LTAG" >> $GITHUB_ENV
          echo "V2RAY_LVER=$V2RAY_LVER" >> $GITHUB_ENV
          echo "V2RAY_CVER=$V2RAY_CVER" >> $GITHUB_ENV

      - name: 'Download image digests'
        uses: actions/download-artifact@v4.2.1
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: 'Set up Docker Buildx'
        uses: docker/setup-buildx-action@v3.10.0

      - name: 'Login to DockerHub'
        uses: docker/login-action@v3.4.0
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ env.DOCKER_PASSWORD }}

      - name: 'Create manifest list and push'
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            -t "${{ env.REGISTRY_IMAGE }}:${{ steps.ref.outputs.latest }}" \
            -t "${{ env.REGISTRY_IMAGE }}:${{ steps.ref.outputs.ref }}" \
            $(printf '${{ env.REGISTRY_IMAGE }}@sha256:%s ' *)

      - name: Inspect image
        run: |
          docker buildx imagetools inspect ${{ env.REGISTRY_IMAGE }}:${{ steps.ref.outputs.latest }}
          docker buildx imagetools inspect ${{ env.REGISTRY_IMAGE }}:${{ steps.ref.outputs.ref }}
name: 'Sync Docker Install Script'

on:
  schedule:
    - cron: '0 16 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    name: 'Sync Docker Install Script'
    runs-on: ubuntu-latest
    steps:
      - name: 'Checkout repository'
        uses: actions/checkout@v4.2.2
        with:
          ref: release
          fetch-depth: 0
      - name: 'Download and compare script'
        run: |
          [ ! -d 'docker' ] && mkdir -p docker
          [ ! -f 'docker/install.sh' ] && touch docker/install.sh
          curl -fsSL -o 'get-docker.sh' get.docker.com
          if ! cmp -s docker/install.sh get-docker.sh; then
            mv -f get-docker.sh docker/install.sh
            echo "changed=true" >> $GITHUB_ENV
          else
            rm -f get-docker.sh
            echo "changed=false" >> $GITHUB_ENV
          fi
      - name: 'Upload commit to repository'
        uses: stefanzweifel/git-auto-commit-action@v5.1.0
        if: ${{ env.changed == 'true' || github.event_name == 'workflow_dispatch' }}
        with:
          commit_message: "Sync docker install script by Github Actions"
          branch: release
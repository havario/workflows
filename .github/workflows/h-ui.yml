---
name: 'Build and Publish h-ui'

on:
  schedule:
    - cron: '0 16 * * *'
  workflow_dispatch:

jobs:
  build:
    name: 'Build and Publish h-ui'
    runs-on: ubuntu-latest
    env:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}

    steps:
      - name: 'Check out repository'
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      - name: 'Fetch Versions and Determine Build'
        run: |
          HUI_CVER="$(wget -qO- --tries=5 "https://hub.docker.com/v2/repositories/honeok/h-ui/tags" | grep -o '"name":"[^"]*"' | sed 's/"name":"//;s/"//' | grep -v '^latest$' | sort -Vr | head -n1 || echo "")"
          HUI_LTAG="$(wget -qO- --tries=5 "https://api.github.com/repos/jonssonyan/h-ui/releases/latest" | grep '"tag_name":' | sed -E 's/.*"([^"]+)".*/\1/')"
          HUI_LVER="${HUI_LTAG#v}"
          [[ -z "$HUI_LTAG" || -z "$HUI_LVER" ]] && echo 'Error: Required parameters cannot be empty.' && exit 1
          echo "HUI_CVER=$HUI_CVER" >> $GITHUB_ENV
          echo "HUI_LTAG=$HUI_LTAG" >> $GITHUB_ENV
          echo "HUI_LVER=$HUI_LVER" >> $GITHUB_ENV
          [[ ( "$(echo -e "$HUI_LVER\n$HUI_CVER" | sort -V | head -n1)" != "$HUI_LVER" ) || -z "$HUI_CVER" ]] && echo "IS_RENEW=1" >> $GITHUB_ENV

      - name: 'Set up Node.js'
        if: env.IS_RENEW == 1 || github.event_name == 'workflow_dispatch'
        uses: actions/setup-node@v4.4.0
        with:
          node-version: 18

      - name: 'Download H-UI Source Code and Build frontend assets'
        if: env.IS_RENEW == 1 || github.event_name == 'workflow_dispatch'
        run: |
          set -ex
          apt-get update && apt-get install -y git
          mkdir -p /tmp/h-ui
          git clone --depth=1 --branch "$HUI_LTAG" https://github.com/jonssonyan/h-ui.git /tmp/h-ui
          cd /tmp/h-ui/frontend/
          npm install -g pnpm
          pnpm install
          pnpm build:prod

      - name: 'Set up Docker QEMU'
        if: env.IS_RENEW == 1 || github.event_name == 'workflow_dispatch'
        uses: docker/setup-qemu-action@v3.6.0

      - name: 'Set up Docker Buildx'
        if: env.IS_RENEW == 1 || github.event_name == 'workflow_dispatch'
        uses: docker/setup-buildx-action@v3.10.0

      - name: 'Login to DockerHub'
        if: env.IS_RENEW == 1 || github.event_name == 'workflow_dispatch'
        uses: docker/login-action@v3.4.0
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ env.DOCKER_PASSWORD }}

      - name: 'Build and Push h-ui image'
        if: env.IS_RENEW == 1 || github.event_name == 'workflow_dispatch'
        uses: docker/build-push-action@v6.17.0
        with:
          context: "/tmp/h-ui"
          file: core/h-ui/Dockerfile
          platforms: linux/386, linux/amd64, linux/arm/v6, linux/arm/v7, linux/arm64/v8, linux/ppc64le, linux/riscv64, linux/s390x
          tags: |
            "${{ env.DOCKER_USERNAME }}/h-ui:${{ env.HUI_LVER }}"
            "${{ env.DOCKER_USERNAME }}/h-ui:latest"
          push: true
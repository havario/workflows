name: 'Build and Publish h-ui'

on:
  schedule:
    - cron: '0 16 * * 0'
  workflow_dispatch:

env:
  IMAGE_NAME: honeok/h-ui
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
  DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}

jobs:
  build:
    name: 'Build and Publish h-ui'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        platform:
          - linux/386
          - linux/amd64
          - linux/arm/v6
          - linux/arm/v7
          - linux/arm64/v8
          - linux/ppc64le
          - linux/riscv64
          - linux/s390x

    steps:
      - name: 'Check out repository'
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      - name: 'Fetch Versions and Determine Build'
        run: |
          HUI_CVER=$(curl -fsL --retry 5 "https://hub.docker.com/v2/repositories/honeok/h-ui/tags" 2>/dev/null | \
            jq -r ".results // [] | .[].name" | grep -v '^latest$' | sort -Vr | head -n1 | awk -F'-' '{print $2}' || echo "")
          HUI_LVER=$(curl -fsL --retry 5 "https://api.github.com/repos/jonssonyan/h-ui/releases/latest" | grep '"tag_name":' | sed -E 's/.*"v?([^"]+)".*/\1/')
          if [[ -z "$HUI_LVER" ]]; then
            echo 'Error: Required parameters cannot be empty.'; exit 1
          fi
          echo "HUI_CVER=$HUI_CVER" >> $GITHUB_ENV
          echo "HUI_LVER=$HUI_LVER" >> $GITHUB_ENV
          if [[ "$(echo -e "$HUI_LVER\n$HUI_CVER" | sort -V | head -n1)" != "$HUI_LVER" || -z "$HUI_CVER" ]]; then
            echo "IS_RENEW=1" >> $GITHUB_ENV
          fi
          PLATFORM_PAIR="${{ matrix.platform }}" && PLATFORM_PAIR="${PLATFORM_PAIR//\//-}"
          echo "PLATFORM_PAIR=$PLATFORM_PAIR" >> $GITHUB_ENV

      - name: 'Set up Docker QEMU'
        if: env.IS_RENEW == 1 || github.event_name == 'workflow_dispatch'
        uses: docker/setup-qemu-action@v3.6.0

      - name: 'Set up Docker Buildx'
        if: env.IS_RENEW == 1 || github.event_name == 'workflow_dispatch'
        uses: docker/setup-buildx-action@v3.10.0

      - name: 'Login to DockerHub'
        if: env.IS_RENEW == 1 || github.event_name == 'workflow_dispatch'
        uses: docker/login-action@v3.4.0
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ env.DOCKER_PASSWORD }}

      - name: 'Build and push h-ui image'
        if: env.IS_RENEW == 1 || github.event_name == 'workflow_dispatch'
        uses: docker/build-push-action@v6.17.0
        with:
          context: "{{ defaultContext }}:core/h-ui"
          file: Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          build-args: |
            BUILDKIT_CONTEXT_KEEP_GIT_DIR=1
          outputs: type=image,name=${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true
          tags: ${{ env.IMAGE_NAME }}:${{ env.HUI_LVER }}

      - name: 'Export image digest to file'
        if: steps.build.outputs.digest != ''
        run: |
          mkdir -p /tmp/digests
           echo "${{ steps.build.outputs.digest }}" > "/tmp/digests/${{ env.PLATFORM_PAIR }}.digest"

      - name: 'Upload image digest artifact'
        if: steps.build.outputs.digest != ''
        uses: actions/upload-artifact@v4.6.2
        with:
          name: digest-${{ env.PLATFORM_PAIR }}
          path: /tmp/digests/${{ env.PLATFORM_PAIR }}.digest
          retention-days: 1

  merge:
    name: 'Merge manifests'
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: 'Set up Docker Buildx'
        uses: docker/setup-buildx-action@v3.10.0

      - name: 'Login to DockerHub'
        uses: docker/login-action@v3.4.0
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ env.DOCKER_PASSWORD }}

      - name: 'Download all digests'
        uses: actions/download-artifact@v4.3.0
        with:
          path: /tmp/digests
          pattern: digest-*
          merge-multiple: true

      - name: 'Create manifest list and push'
        run: |
          DIGESTS=$(find /tmp/digests -type f -exec cat {} \;)
          docker buildx imagetools create \
            -t "${IMAGE_NAME}:${{ env.HUI_LVER }}" \
            -t "${IMAGE_NAME}:latest" \
            $(echo "$DIGESTS" | awk '{print "'"${IMAGE_NAME}"'" "@" $1}')

      - name: 'Inspect merged image'
        run: |
          docker buildx imagetools inspect ${IMAGE_NAME}:${{ env.HUI_LVER }}
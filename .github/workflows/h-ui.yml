name: 'Build and Publish h-ui'

on:
  schedule:
    - cron: '0 16 * * 0'
  workflow_dispatch:

jobs:
  build:
    name: 'Build and Publish h-ui'
    runs-on: ubuntu-latest
    env:
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
    strategy:
      fail-fast: true
      matrix:
        platform:
          - linux/386
          - linux/amd64
          - linux/arm/v6
          - linux/arm/v7
          - linux/arm64/v8
          - linux/ppc64le
          - linux/s390x

    steps:
      - name: 'Check out repository'
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      - name: 'Fetch Versions and Determine Build'
        run: |
          HUI_CVER=$(curl -fsL --retry 5 "https://hub.docker.com/v2/repositories/honeok/h-ui/tags" 2>/dev/null | \
            jq -r ".results // [] | .[].name" | grep -v '^latest$' | sort -Vr | head -n1 | awk -F'-' '{print $2}' || echo "")
          HUI_LVER=$(curl -fsL --retry 5 "https://api.github.com/repos/jonssonyan/h-ui/releases/latest" | grep '"tag_name":' | sed -E 's/.*"v?([^"]+)".*/\1/')
          if [[ -z "$HUI_LVER" ]]; then
            echo 'Error: Required parameters cannot be empty.'; exit 1
          fi
          echo "HUI_CVER=$HUI_CVER" >> $GITHUB_ENV
          echo "HUI_LVER=$HUI_LVER" >> $GITHUB_ENV
          if [[ "$(echo -e "$HUI_LVER\n$HUI_CVER" | sort -V | head -n1)" != "$HUI_LVER" || -z "$HUI_CVER" ]]; then
            echo "IS_RENEW=1" >> $GITHUB_ENV
          fi
          PLATFORM_PAIR="${{ matrix.platform }}" && PLATFORM_PAIR="${PLATFORM_PAIR//\//-}"
          echo "PLATFORM_PAIR=$PLATFORM_PAIR" >> $GITHUB_ENV

      - name: 'Set up Docker QEMU'
        if: env.IS_RENEW == 1 || github.event_name == 'workflow_dispatch'
        uses: docker/setup-qemu-action@v3.6.0

      - name: 'Set up Docker Buildx'
        if: env.IS_RENEW == 1 || github.event_name == 'workflow_dispatch'
        uses: docker/setup-buildx-action@v3.10.0

      - name: 'Login to DockerHub'
        if: env.IS_RENEW == 1 || github.event_name == 'workflow_dispatch'
        uses: docker/login-action@v3.4.0
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ env.DOCKER_PASSWORD }}

      - name: 'Build and push h-ui image'
        if: env.IS_RENEW == 1 || github.event_name == 'workflow_dispatch'
        uses: docker/build-push-action@v6.17.0
        with:
          context: "{{ defaultContext }}:core/h-ui"
          file: Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ env.DOCKER_USERNAME }}/h-ui:${{ env.HUI_LVER }}